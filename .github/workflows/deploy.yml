name: Cross-Compile and Deploy to Pi Zero 2W

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_INCREMENTAL: 0
      CARGO_NET_RETRY: 10
      TARGET: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: 1.88.0
          targets: aarch64-unknown-linux-gnu

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: cross-${{ env.TARGET }}
          cache-on-failure: true
          cache-all-crates: true

      - name: Install Cross
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! command -v cross &>/dev/null; then
            if ! command -v cargo-binstall &>/dev/null; then
              BINSTALL_VERSION="1.10.9"
              BINSTALL_ARCHIVE="cargo-binstall-x86_64-unknown-linux-musl.tgz"
              BINSTALL_SHA256="4ccfcd8e0ac8518790e5a49d640a7044448c7925622aa53f98101f4d1e449607"

              curl -LsSf \
                "https://github.com/cargo-bins/cargo-binstall/releases/download/v${BINSTALL_VERSION}/${BINSTALL_ARCHIVE}" \
                -o "/tmp/${BINSTALL_ARCHIVE}"

              echo "${BINSTALL_SHA256}  /tmp/${BINSTALL_ARCHIVE}" | sha256sum --check --status

              tar -xzf "/tmp/${BINSTALL_ARCHIVE}" -C "${HOME}/.cargo/bin" cargo-binstall
              rm -f "/tmp/${BINSTALL_ARCHIVE}"
            fi

            cargo binstall cross@0.2.5 --locked --no-confirm --force
          fi

          echo "cross resolved to: $(command -v cross)"
          cross --version

      - name: Run Cross Build
        shell: bash
        run: |
          set -euo pipefail
          export CROSS_CONTAINER_VOLUME_CACHEDIR="$HOME/.cargo"
          cross build --release --target "${TARGET}"

      - name: Fix target directory permissions for caching
        if: always()
        run: |
          sudo chown -R "$(id -u):$(id -g)" target/ "$HOME/.cargo"

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mcbot-binary
          path: target/${{ env.TARGET }}/release/mcbot
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DEPLOY_USER: akaalroopsingh
      DEPLOY_HOST: 100.66.120.48
      REMOTE_DIR: /home/akaalroopsingh/mcbot
      REMOTE_BIN: /home/akaalroopsingh/mcbot/mcbot
      REMOTE_TMP_BIN: /home/akaalroopsingh/mcbot/mcbot_new
      ENV_FILE: /home/akaalroopsingh/mcbot/.env.deploy
      APP_REVISION: ${{ github.sha }}
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: mcbot-binary
          path: ./bin

      - name: Connect to Tailscale Network
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:github-actions
          version: 1.98.8

      - name: Tailscale diagnostics
        run: |
          tailscale status
          tailscale ping --timeout=5s "${DEPLOY_HOST}" || true
          tailscale netcheck || true

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@87a8f067114a8ce263df83e9ed5c849953548bc3
        with:
          key: ${{ secrets.PI_SSH_KEY }}
          known_hosts: ${{ secrets.PI_KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Deploy Binary and Restart
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./bin/mcbot
          scp ./bin/mcbot "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_TMP_BIN}"

          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -seuo pipefail' <<EOF
          REMOTE_BIN='${REMOTE_BIN}'
          REMOTE_TMP_BIN='${REMOTE_TMP_BIN}'
          ENV_FILE='${ENV_FILE}'
          APP_REVISION='${APP_REVISION}'

          chmod +x "\$REMOTE_TMP_BIN"
          mv -f "\$REMOTE_TMP_BIN" "\$REMOTE_BIN"

          touch "\$ENV_FILE"
          chmod 600 "\$ENV_FILE"

          TMP_ENV=\$(mktemp "\${ENV_FILE}.XXXXXX")
          trap 'rm -f "\$TMP_ENV"' EXIT

          awk '!/^APP_REVISION=/' "\$ENV_FILE" > "\$TMP_ENV"
          printf 'APP_REVISION=%s\n' "\$APP_REVISION" >> "\$TMP_ENV"

          chmod 600 "\$TMP_ENV"
          mv -f "\$TMP_ENV" "\$ENV_FILE"
          trap - EXIT

          sudo systemctl restart mcbot
          EOF